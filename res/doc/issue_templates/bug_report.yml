name: Bug Report
description: Report a reproducible bug
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
    - type: markdown
      attributes:
          value: |
              Thanks for reporting a bug. Please provide as much detail as possible.

    - type: textarea
      id: description
      attributes:
          label: Describe the bug
          description: Clear and concise description of the issue.
          placeholder: What happened?
      validations:
          required: true

    - type: textarea
      id: steps
      attributes:
          label: Steps to reproduce
          description: How can we reproduce it?
          placeholder: |
              1. Go to '...'
              2. Click on '...'
              3. Scroll down to '...'
              4. See error
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected behavior
          placeholder: What you expected to happen

    - type: textarea
      id: actual
      attributes:
          label: Actual behavior
          placeholder: What actually happened

    - type: dropdown
      id: severity
      attributes:
          label: Severity
          options:
              - Low
              - Medium
              - High
              - Critical
      validations:
          required: true

    - type: input
      id: environment
      attributes:
          label: Environment
          placeholder: OS, Browser, Version, Device

    - type: textarea
      id: logs
      attributes:
          label: Logs / Screenshots
          description: Add logs or screenshots if available
          render: shell

    - type: dropdown
      id: priority
      attributes:
      label: Priority
      options:
          - Low
          - Medium
          - High
          - Hot
